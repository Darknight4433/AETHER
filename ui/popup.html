<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
/* NATIVE WINDOWS POPUP STYLE */
html, body {
    margin: 0;
    padding: 0;
    background: transparent !important;
    font-family: "Segoe UI", -apple-system, sans-serif;
    color: #f1f5f9;
    overflow: hidden;
}

.card {
    width: 250px;
    height: 160px;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    padding: 12px;
    box-sizing: border-box;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    padding-bottom: 6px;
}

.title-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

#status-dot {
    width: 8px;
    height: 8px;
    background: #eab308;
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(234, 179, 8, 0.4);
}

.title-group span {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    color: #cbd5e1;
}

.settings-btn {
    font-size: 14px;
    opacity: 0.6;
    cursor: pointer;
}

.stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
}

.stat-item {
    font-size: 11px;
    color: #94a3b8;
}

.stat-item span {
    color: #38bdf8;
    font-weight: 600;
}

.status-row {
    font-size: 10px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #eab308;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.controls {
    display: flex;
    gap: 6px;
}

button {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    padding: 6px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 10px;
    font-weight: 700;
    transition: all 0.2s;
}

button:hover {
    background: rgba(255, 255, 255, 0.1);
}

button.primary {
    background: rgba(56, 189, 248, 0.15);
    border-color: rgba(56, 189, 248, 0.4);
    color: #38bdf8;
}

/* DRAG GLOBE */
.mini-glob {
    position: fixed;
    bottom: 11px;
    right: 11px;
    width: 14px;
    height: 14px;
    background: rgba(56, 189, 248, 0.2);
    border: 1px solid rgba(56, 189, 248, 0.4);
    border-radius: 50%;
    cursor: move;
}

.drag-handle {
    position: absolute;
    top: 0;
    left: 0;
    width: 80%;
    height: 25px;
    cursor: move;
}
</style>
</head>
<body>

<div class="drag-handle" id="drag"></div>

<div class="card">
  <div class="header">
    <div class="title-group">
      <div id="status-dot"></div>
      <span>AETHER</span>
    </div>
    <div class="settings-btn">⚙</div>
  </div>

  <div class="stats-grid">
    <div class="stat-item">CPU: <span id="cpu-val">--</span>%</div>
    <div class="stat-item">RAM: <span id="ram-val">--</span>%</div>
  </div>

  <div class="status-row">
      <span>STATE:</span>
      <span id="status-text">IDLE</span>
  </div>

  <div class="stat-item" style="margin-bottom: 12px; font-size: 10px; color: #64748b;">
      APP: <span id="active-app" style="color: #94a3b8; font-weight: 700;">Desktop</span>
  </div>


  <div class="controls">
    <button class="primary" onclick="window.pywebview.api.start_aether()">START</button>
    <button onclick="window.pywebview.api.stop_aether()">STOP</button>
  </div>
</div>

<div class="mini-glob" id="glob"></div>

<script>
window.updateStats = function(cpu, ram, status, app) {
    document.getElementById("cpu-val").innerText = cpu;
    document.getElementById("ram-val").innerText = Math.round(ram * 0.16 * 10)/10 + " GB"; 
    document.getElementById("active-app").innerText = app;

    
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    
    statusText.innerText = status.toUpperCase();
    
    const colors = {
        idle: "#22c55e",       // Green
        listening: "#38bdf8",  // Blue
        thinking: "#a855f7",   // Purple
        speaking: "#ef4444"    // Red
    };
    
    const color = colors[status] || "#eab308";
    statusText.style.color = color;
    statusDot.style.background = color;
    statusDot.style.boxShadow = `0 0 10px ${color}`;
};

const setupDrag = (id) => {
    document.getElementById(id).addEventListener('mousedown', function() {
        if (window.pywebview && window.pywebview.api) {
            window.pywebview.api.start_drag();
        }
    });
};

setupDrag('drag');
setupDrag('glob');
</script>

</body>
</html>
