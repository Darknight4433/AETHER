<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
/* POPUP DESIGN (CLEAN WINDOWS STYLE) */
body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "Segoe UI", "Variable Font", sans-serif;
    color: #f1f5f9;
    overflow: hidden;
}

.card {
    width: 280px;
    height: 200px;
    background: rgba(15, 23, 42, 0.85); /* Deep slate with glassmorphism */
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    padding: 16px;
    box-sizing: border-box;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
}

.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.top span:first-child {
    font-weight: 700;
    letter-spacing: 1.5px;
    font-size: 14px;
    color: #e2e8f0;
}

#status-dot {
    width: 10px;
    height: 10px;
    background: #eab308; /* Default yellow for IDLE */
    border-radius: 50%;
    box-shadow: 0 0 8px rgba(234, 179, 8, 0.6);
    transition: all 0.3s ease;
}

.stats {
    flex: 1;
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.8;
}

.stats span {
    color: #38bdf8;
    font-weight: 600;
}

.status-label {
    text-align: center;
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    color: #eab308;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.controls {
    display: flex;
    gap: 10px;
}

button {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #e2e8f0;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s ease;
}

button:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.2);
}

button.primary {
    background: rgba(56, 189, 248, 0.1);
    border-color: rgba(56, 189, 248, 0.3);
    color: #38bdf8;
}

button.primary:hover {
    background: rgba(56, 189, 248, 0.2);
}

/* DRAG HANDLE */
.drag-bar {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 10px;
    cursor: move;
}
</style>
</head>
<body>

<div class="drag-bar" id="drag"></div>

<div class="card">
  <div class="top">
    <span>AETHER ●</span>
    <div id="status-dot"></div>
  </div>

  <div class="stats">
    CPU: <span id="cpu-val">--</span>% <br>
    RAM: <span id="ram-val">--</span>%
  </div>

  <div class="status-label" id="status-text">IDLE</div>

  <div class="controls">
    <button class="primary" onclick="window.pywebview.api.start_aether()">START</button>
    <button onclick="window.pywebview.api.stop_aether()">STOP</button>
  </div>
</div>

<script>
window.updateStats = function(cpu, ram, status) {
    document.getElementById("cpu-val").innerText = cpu;
    document.getElementById("ram-val").innerText = ram;
    
    const statusText = document.getElementById("status-text");
    const statusDot = document.getElementById("status-dot");
    
    statusText.innerText = status.toUpperCase();
    
    const colors = {
        idle: "#eab308",       // Yellow/Orange
        listening: "#38bdf8",  // Blue
        thinking: "#a855f7",   // Purple
        speaking: "#ef4444"    // Red
    };
    
    const color = colors[status] || "#e2e8f0";
    statusText.style.color = color;
    statusDot.style.background = color;
    statusDot.style.boxShadow = `0 0 10px ${color}`;
};

document.getElementById('drag').addEventListener('mousedown', function() {
    if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.start_drag();
    }
});
</script>

</body>
</html>
